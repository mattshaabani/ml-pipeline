# Model hyperparameter search spaces for Optuna

logistic_regression:
  C:
    type: float
    low: 0.001
    high: 10.0
    log: true
  max_iter: 1000
  solver: "lbfgs"

random_forest:
  n_estimators:
    type: int
    low: 50
    high: 300
  max_depth:
    type: int
    low: 3
    high: 15
  min_samples_split:
    type: int
    low: 2
    high: 20
  min_samples_leaf:
    type: int
    low: 1
    high: 10

xgboost:
  n_estimators:
    type: int
    low: 50
    high: 300
  max_depth:
    type: int
    low: 3
    high: 10
  learning_rate:
    type: float
    low: 0.01
    high: 0.3
    log: true
  subsample:
    type: float
    low: 0.6
    high: 1.0
  colsample_bytree:
    type: float
    low: 0.6
    high: 1.0

lightgbm:
  n_estimators:
    type: int
    low: 50
    high: 300
  max_depth:
    type: int
    low: 3
    high: 10
  learning_rate:
    type: float
    low: 0.01
    high: 0.3
    log: true
  num_leaves:
    type: int
    low: 20
    high: 100
  subsample:
    type: float
    low: 0.6
    high: 1.0